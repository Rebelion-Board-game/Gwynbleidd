services:
  db:
    image: postgres:15-alpine
    container_name: gwynbleidd_db
    restart: always
    env_file: .env_db  
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gwynbleidd_net

  app:
    image: ghcr.io/rebelion-board-game/gwynbleidd/gwynbleidd:lates
    image: test
    restart: unless-stopped
    env_file: .env  
    environment:
      DB_HOST: db
    ports:
      - "4443:4443"
    depends_on:
      - db
    networks:
      - gwynbleidd_net

volumes:
  postgres_data:

networks:
  gwynbleidd_net:
    driver: bridge
